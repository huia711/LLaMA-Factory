### model
model_name_or_path: /leonardo/home/userexternal/mli00001/GUI/models/Qwen2.5-VL-7B-Instruct
image_max_pixels: 589824
image_min_pixels: 1024
video_max_pixels: 65536
video_min_pixels: 256
trust_remote_code: true

### method
stage: sft
do_train: true
do_eval: true
finetuning_type: lora
lora_rank: 8
lora_target: all

### dataset
dataset_dir: /leonardo/home/userexternal/mli00001/GUI/data/AgentNet
dataset:
  - agentnet_ubuntu_subtask_v6_train
template: qwen2_vl
data_shared_file_system: true
cutoff_len: 16384
max_samples: null
overwrite_cache: false
preprocessing_num_workers: 64
dataloader_num_workers: 4
packing: false
enable_thinking: false

### output
output_dir: /leonardo/home/userexternal/mli00001/GUI/results/train/qwen2_5vl-7b/lora-sft-subtask-v6
logging_steps: 5
save_steps: 50
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
run_name: qwen2_5vl_lora_sft_subtask_v6_boundary

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 32
learning_rate: 2.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
include_num_input_tokens_seen: true

# speed / stability
optim: adamw_torch
flash_attn: auto

### eval
val_size: 0.01
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
