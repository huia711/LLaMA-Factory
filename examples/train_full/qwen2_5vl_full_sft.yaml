### model
model_name_or_path: /hkfs/work/workspace/scratch/tum_rca6709-gui/models/Qwen2.5-VL-7B-Instruct
# 多模态分辨率上限/下限（显存/速度/效果权衡）
# 经验：GUI 截图很容易让图像 token 过长，配合 cutoff_len 截断会触发
# “Image features and image tokens do not match”。
# 先把上限降到 ~512x512，显著降低图像 token 长度，稳定训练。
image_max_pixels: 589824
image_min_pixels: 1024
video_max_pixels: 65536
video_min_pixels: 256
trust_remote_code: true

### method
stage: sft
do_train: true
do_eval: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false
deepspeed: examples/deepspeed/ds_z2_config.json

### dataset
# 你的环境默认数据在大盘 AgentNet（如需换数据集，直接改下面两行即可）
dataset_dir: /hkfs/work/workspace/scratch/tum_rca6709-gui/AgentNet
dataset:
  - agentnet_ubuntu_5k_sharegpt
  - agentnet_win_mac_5k_sharegpt
template: qwen2_vl
# 提高上下文长度，避免多模态 token 被截断导致 tokens/features 不一致
cutoff_len: 8192
max_samples: null
overwrite_cache: true
preprocessing_num_workers: 64
dataloader_num_workers: 4
packing: false
enable_thinking: true

### output
output_dir: /hkfs/work/workspace/scratch/tum_rca6709-gui/saves/qwen2_5vl-7b/full-sft-260103-h200-8
logging_steps: 5
save_steps: 100
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: swanlab
use_swanlab: true
swanlab_project: llamafactory
swanlab_run_name: qwen2_5vl_full_sft_agentnet_260102
swanlab_mode: cloud 
# report_to: wandb  # choices: [none, wandb, tensorboard, swanlab, mlflow]
# run_name: qwen2_5vl_full_sft_agentnet   # 可选：W&B run 名称（TrainingArguments）

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
# LoRA 通常用更大的学习率
learning_rate: 1.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
include_num_input_tokens_seen: true

# speed / stability
optim: adamw_torch
flash_attn: auto

### eval
# 参考 LLaMA-Factory 的常见用法：训练中用小比例验证集监控 loss/accuracy（不做生成）。
# 多模态 eval 会更慢，建议先从小 val_size 开始。
val_size: 0.01
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
